{% macro stock_header(ma_cp) %}
{#
  Renders the stock header card.
  Data is populated by JavaScript (initKetQua) after API call.
  Skeleton shows while loading.
#}
<div id="stockHeader" class="stock-header">
  <div class="row align-items-center g-3">

    <!-- Left: ticker + company name + meta pills -->
    <div class="col-md-6">
      <div class="ticker-code" id="hdrTicker">{{ ma_cp }}</div>
      <div class="company-name" id="hdrCompany">
        <span class="skeleton skeleton-text w-75" style="height:0.875em; display:inline-block;"></span>
      </div>
      <div class="d-flex flex-wrap gap-2 mt-2" id="hdrMeta">
        <span class="meta-pill skeleton" style="width:60px; height:24px;"></span>
        <span class="meta-pill skeleton" style="width:80px; height:24px;"></span>
      </div>
    </div>

    <!-- Right: price + change + signal -->
    <div class="col-md-6">
      <div class="d-flex align-items-end justify-content-md-end gap-3 flex-wrap">
        <div>
          <div class="label-metric text-white-50 mb-1">Giá hiện tại</div>
          <div class="d-flex align-items-baseline gap-2">
            <span class="current-price" id="hdrPrice">—</span>
            <span class="price-change" id="hdrChange">—</span>
          </div>
        </div>
        <div class="d-flex flex-column align-items-end gap-2">
          <span id="hdrSignal" class="badge badge-signal"></span>
          <div class="d-flex gap-2">
            <a href="{{ url_for('trang.so_sanh') }}?ma={{ ma_cp }}"
               class="btn btn-outline-light btn-sm">
              <span class="material-icons">compare_arrows</span>
              So sánh
            </a>
            <button id="btnXuatExcel"
                    class="btn btn-success btn-sm"
                    data-ma="{{ ma_cp }}">
              <span class="material-icons">download</span>
              Xuất Excel
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endmacro %}
